<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aluno Online</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

    <aside class="sidebar">
      <header class="sidebar-brand">
        <img src="public/learn.svg" class="sidebar-icon" alt="Ícone Aluno Online">
        <h2>Aluno Online</h2>
      </header>
      
      <nav>
        <ul>
          <li><a href="#">Dashboard</a></li>
          <li><a href="#">Minhas Disciplinas</a></li>
          <li><a href="#">Calendário</a></li>
        </ul>
      </nav>
    </aside>

    <main class="main-content">

      <header class="topbar">
        <h1>Olá, Estudante!</h1>
        <img src="public/avatar.svg" class="avatar" alt="Avatar do estudante">
      </header>

      <section class="topbar">
        <h2>Bem-vindo ao portal do aluno</h2>
      </section>
      
      <section class="dashboard-grid">
        <article class="card">
          <h2>Mural de Avisos</h2>
          <p>Você não tem novos avisos no momento.</p>
        </article>

        <article class="card">
          <h2>Calendário Acadêmico</h2>
          <p>Entrega da Prática 01: Hoje.</p>
        </article>

        <article class="card">
          <h2>Minhas Disciplinas</h2>
          <ul>
            <li>Desenvolvimento Front-end</li>
            <li>Banco de Dados</li>
          </ul>
        </article>

      </section>
    </main>
</body>

</html>
